# name of the output folder
results: "results-testrun-hifi"

# archive with compressed haplotypes
agc:
   PanGenie-SHAPEIT: "PanGenie-SHAPEIT_all_consensus-haplotypes.agc"

sample_sheet: "sample-sheet-hifi.tsv"
cram_ref: "/gpfs/project/projects/medbioinf/users/ebler/long-read-1kg/data/1KG_ONT_VIENNA_hg38.fa"

